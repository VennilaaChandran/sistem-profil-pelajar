<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <title>Sistem Profil Pelajar</title>
   <style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#8e74eb,#9face6);
    display:flex;
    flex-direction:column;
    align-items:center;
    padding-top:50px;
}

h1{
    color:#fff;
    font-size:32px;
    margin-bottom:25px;
    text-shadow:2px 2px 5px rgba(0,0,0,0.2);
}

.container{
    width:420px;
    background:#fff;
    padding:30px;
    border-radius:20px;
    box-shadow:0 15px 35px rgba(0,0,0,0.2);
    animation:fadeIn 0.8s ease;
}

label{
    display:block;
    margin-bottom:6px;
    font-weight:600;
    color:#333;
}

input,
select{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:2px solid #e0e0e0;
    border-radius:10px;
    font-size:14px;
    transition:0.3s;
}

input:focus,
select:focus{
    border-color:#6c63ff;
    outline:none;
    box-shadow:0 0 8px rgba(108,99,255,0.3);
}

button{
    width:100%;
    padding:12px;
    background:linear-gradient(135deg,#6c63ff,#4d44db);
    color:white;
    border:none;
    border-radius:10px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 8px 15px rgba(108,99,255,0.3);
}

#output{
    margin-top:20px;
    padding:15px;
    border-radius:10px;
    background:#f5f7ff;
    border-left:5px solid #6c63ff;
    color:#333;
    min-height:50px;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>

<body>

<h2>Sistem Profil Pelajar</h2>

<div class="container">

    <label>Nama Pelajar:</label>
    <input type="text" id="nama">

    <label>Program:</label>
    <select id="program">
        <option value="Multimedia">Multimedia</option>
        <option value="Rangkaian">Rangkaian</option>
        <option value="CADD">CADD</option>
        <option value="Perisian">Perisian</option>
    </select>

    <label>E-mel:</label>
    <input type="email" id="email">

    <button onclick="paparMaklumat()">Papar Maklumat</button>

    <div id="output"></div>

</div>

<script src="script.js"></script>

</body>
</html>
