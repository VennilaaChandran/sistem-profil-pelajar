<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistem Profil Pelajar</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#8e74eb,#9face6);
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:450px;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    margin-bottom:20px;
    color:#333;
}

label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
}

input,
select{
    width:100%;
    padding:10px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#6c63ff;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#5548e5;
}

#output{
    margin-top:20px;
    padding:15px;
    background:#f3f3f3;
    border-radius:8px;
}
</style>

</head>
<body>

<div class="container">

    <h2>Sistem Profil Pelajar</h2>

    <label>Nama Pelajar</label>
    <input type="text" id="nama">

    <label>No Matrik</label>
    <input type="text" id="matrik">

    <label>Program</label>
    <select id="program">
        <option value="Multimedia">Multimedia</option>
        <option value="Rangkaian">Rangkaian</option>
        <option value="CADD">CADD</option>
        <option value="Perisian">Perisian</option>
    </select>

    <label>E-mel</label>
    <input type="email" id="email">

    <button id="papar" onclick="paparMaklumat()">
        Papar Maklumat
    </button>

    <div id="output"></div>

</div>

<script>
function paparMaklumat(){

    let nama = document.getElementById("nama").value;
    let matrik = document.getElementById("matrik").value;
    let program = document.getElementById("program").value;
    let email = document.getElementById("email").value;

    document.getElementById("output").innerHTML = `
        <h3>Maklumat Pelajar</h3>
        <p>Nama: ${nama}</p>
        <p>No Matrik: ${matrik}</p>
        <p>Program: ${program}</p>
        <p>Email: ${email}</p>
    `;
}
</script>

</body>
</html>
